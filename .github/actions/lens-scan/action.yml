name: 'Lens PR Bot'
description: 'Run Lens code quality scan — SARIF upload, dependency check, and PR comment'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  path:
    description: 'Directory to scan'
    required: false
    default: '.'
  config:
    description: 'Path to quality-gate.toml'
    required: false
    default: ''
  gate:
    description: 'Fail the workflow on quality gate violation'
    required: false
    default: 'false'
  max-rating:
    description: 'Maximum rating allowed (A-E). Fails if any rating is worse.'
    required: false
    default: ''
  comment:
    description: 'Post PR comment with results'
    required: false
    default: 'true'
  deps:
    description: 'Also scan dependencies for vulnerabilities'
    required: false
    default: 'true'
  sarif:
    description: 'Upload SARIF to GitHub Code Scanning'
    required: false
    default: 'true'
  version:
    description: 'Lens version to install (default: latest)'
    required: false
    default: 'latest'
  token:
    description: 'GitHub token for PR comment'
    required: false
    default: ${{ github.token }}

outputs:
  scan-exit:
    description: 'Exit code of lens scan (0 = pass)'
    value: ${{ steps.scan.outputs.exit }}
  issue-count:
    description: 'Total issues found'
    value: ${{ steps.parse.outputs.issues }}
  blocker-count:
    description: 'Blocker issues'
    value: ${{ steps.parse.outputs.blockers }}

runs:
  using: 'composite'
  steps:
    - name: Install Lens
      shell: bash
      run: |
        if command -v lens &> /dev/null; then
          echo "Lens already installed: $(lens --version)"
          exit 0
        fi
        echo "Installing Lens..."
        if [ "${{ inputs.version }}" = "latest" ]; then
          LATEST=$(curl -sL -H 'Accept: application/vnd.github+json' https://api.github.com/repos/fatmuh/lens/releases/latest 2>/dev/null | grep '"tag_name"' | head -1 | sed 's/.*"v\([0-9.]*\)".*/\1/')
          if [ -z "$LATEST" ]; then
            echo "Could not determine latest version, falling back to v0.9.0"
            LATEST="0.9.0"
          fi
        else
          LATEST="${{ inputs.version }}"
        fi
        echo "  Installing v${LATEST}..."
        curl -sL "https://github.com/fatmuh/lens/releases/download/v${LATEST}/lens-x86_64-unknown-linux-musl.tar.gz" -o /tmp/lens.tar.gz
        tar xzf /tmp/lens.tar.gz -C /usr/local/bin
        chmod +x /usr/local/bin/lens
        lens --version

    - name: Run Lens scan
      id: scan
      shell: bash
      run: |
        ARGS="scan ${{ inputs.path }} --format json --quiet"
        [ -n "${{ inputs.config }}" ] && ARGS="$ARGS -c ${{ inputs.config }}"

        set +e
        lens $ARGS > /tmp/lens-results.json 2>/dev/null
        echo "exit=$?" >> $GITHUB_OUTPUT
        set -e

    - name: Parse issue counts
      id: parse
      if: always()
      shell: bash
      run: |
        ISSUES="0"
        BLOCKERS="0"
        if [ -f /tmp/lens-results.json ]; then
          ISSUES=$(python3 -c "import json; print(len(json.load(open('/tmp/lens-results.json')).get('issues',[])))" 2>/dev/null || echo "0")
          BLOCKERS=$(python3 -c "import json; print(sum(1 for i in json.load(open('/tmp/lens-results.json')).get('issues',[]) if i.get('severity')=='blocker'))" 2>/dev/null || echo "0")
        fi
        echo "issues=${ISSUES}" >> $GITHUB_OUTPUT
        echo "blockers=${BLOCKERS}" >> $GITHUB_OUTPUT

    - name: Run dependency scan
      if: inputs.deps == 'true'
      shell: bash
      continue-on-error: true
      run: |
        lens dep ${{ inputs.path }} --format json --quiet > /tmp/lens-deps.json 2>/dev/null || true

    - name: Build PR comment
      if: inputs.comment == 'true'
      shell: bash
      run: |
        python3 ${{ github.action_path }}/../../scripts/build-pr-comment.py > /tmp/lens-comment.md

    - name: Post PR comment
      if: inputs.comment == 'true' && github.event.pull_request.number != ''
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.token }}
        script: |
          const fs = require('fs');
          const body = fs.readFileSync('/tmp/lens-comment.md', 'utf8');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const marker = '<!-- lens-ci-comment -->';
          const existing = comments.find(c => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
          }

    - name: Upload SARIF
      if: inputs.sarif == 'true' && always()
      shell: bash
      run: |
        lens scan ${{ inputs.path }} --format sarif --quiet > lens-results.sarif 2>/dev/null || true

    - name: Upload to Code Scanning
      if: inputs.sarif == 'true' && always() && hashFiles('lens-results.sarif') != ''
      uses: github/codeql-action/upload-sarif@v3
      continue-on-error: true
      with:
        sarif_file: lens-results.sarif
        category: lens

    - name: Quality gate
      if: inputs.gate == 'true' && steps.scan.outputs.exit != '0'
      shell: bash
      run: |
        echo "::error::Lens quality gate failed"
        exit 1
